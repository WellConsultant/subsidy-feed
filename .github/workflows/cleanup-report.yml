name: Cleanup Expired Report

on:
  schedule:
    - cron: '5 0 13 5 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete expired report file
        run: |
          TARGET="report/wiypi2mu9j0pscg.html"
          if [ -f "$TARGET" ]; then
            git rm "$TARGET"
            echo "Deleted: $TARGET"
          else
            echo "File not found (already deleted?): $TARGET"
          fi

      - name: Commit and push if file was deleted
        run: |
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: remove expired report (auto-cleanup 2026-05-13)"
            git push
          fi
